<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Birdmember — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#1D1E1B; --grey2:#64748B; --light:#F8FAFC; --grey:#F2F2F2;
    --blue:#094D8D; --lightblue:#3A8FCE; --green:#29A63E; --greenbg:#DBFCE7;
    --orange:#F1870D; --disblue:#A8C8E8;
    --font-body:'Montserrat',-apple-system,'Segoe UI',sans-serif;
    --font-head:'Galano Grotesque Alt','Galano Grotesque','Poppins',var(--font-body);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#EDF1F6;font-family:var(--font-body);color:var(--black);-webkit-font-smoothing:antialiased;
       display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:26px 12px}

  .phone{width:440px;height:956px;background:#fff;border-radius:48px;border:1px solid #E3E9F0;
         box-shadow:0 30px 80px rgba(13,42,80,.16);overflow:hidden;position:relative;
         display:flex;flex-direction:column;flex-shrink:0}
  @media (max-height:1040px){ .phone{transform:scale(.88);transform-origin:center} body{gap:0} }
  .views{flex:1;position:relative;overflow:hidden}
  .view{position:absolute;inset:0;display:none;flex-direction:column;background:#fff}
  .view.active{display:flex;animation:vin .22s ease}
  @keyframes vin{from{opacity:.35;transform:translateX(14px)}to{opacity:1;transform:none}}
  .scroll{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
  .scroll::-webkit-scrollbar{display:none}

  /* header */
  .hdr{display:flex;gap:13px;align-items:center;height:32px;padding:0 30px;margin-top:28px}
  .hdr .lg svg{width:29px;height:32px;display:block}
  .hdr b{font-size:20px;font-weight:700;color:var(--black)}
  .hdr .sp{flex:1}
  .hdr-sub{padding:0 30px;font-size:14px;color:var(--grey2);margin-top:8px}
  .hdr-back{display:flex;gap:12px;align-items:center;padding:26px 24px 12px;border-bottom:1px solid var(--grey)}
  .hdr-back .bk{width:24px;height:24px;color:var(--black);cursor:pointer;flex:none;display:flex}
  .hdr-back b{font-size:17px;font-weight:700}
  .hdr-back .sp{flex:1}

  .ic svg,.ni svg,.bk svg{width:100%;height:100%;display:block}

  /* buttons */
  .btn{height:48px;border-radius:50px;display:flex;align-items:center;justify-content:center;gap:8px;
       font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer;border:0;width:100%}
  .btn.primary{background:var(--blue);color:#fff}
  .btn.ghost{background:#fff;border:1px solid var(--grey);color:var(--grey2)}
  .btn.orange{background:var(--orange);color:#fff}
  .btn.sm{height:38px;font-size:14px}
  .btn.disabled{background:var(--disblue);color:#fff;cursor:default}
  .btn:active{filter:brightness(.96)}
  .btn-row{display:flex;gap:14px;width:100%}
  .btn-row .btn{flex:1}

  /* cards */
  .card{border:1px solid var(--grey);border-radius:15px;padding:20px;background:#fff}
  .role-chip{background:var(--lightblue);color:#fff;font-size:12px;font-weight:700;border-radius:8px;
             padding:4px 14px;flex:none;height:25px;display:flex;align-items:center}
  .avatar{border-radius:50%;object-fit:cover;display:block;background:#D9D9D9}
  .avatar-wrap{position:relative;flex:none}
  .presence{position:absolute;right:1px;bottom:1px;width:14px;height:14px;border-radius:50%;
            background:var(--green);border:2.5px solid #fff}
  .initials{border-radius:50%;background:var(--light);color:var(--grey2);font-weight:700;
            display:flex;align-items:center;justify-content:center;flex:none}

  /* discover */
  .search-row{display:flex;gap:14px;margin:8px 30px 0;align-items:center}
  .search{flex:1;height:48px;border-radius:8px;background:var(--light);display:flex;align-items:center;
          padding:0 15px;gap:10px;font-size:14px;color:var(--grey2)}
  .search .ic{width:22px;height:22px;color:var(--grey2);flex:none}
  .filter-btn{width:48px;height:48px;border-radius:8px;border:1px solid var(--grey);display:flex;
              align-items:center;justify-content:center;cursor:pointer;background:#fff}
  .filter-btn .ic{width:22px;height:22px;color:var(--black)}
  .seg{margin:14px 30px 0;height:34px;border-radius:8px;background:var(--light);display:flex;padding:4px;gap:4px}
  .seg div{flex:1;border-radius:6px;display:flex;align-items:center;justify-content:center;gap:7px;
           font-size:14px;color:var(--grey2);cursor:pointer}
  .seg div .ic{width:17px;height:17px;color:var(--grey2)}
  .seg div.on{background:#fff;color:var(--black);font-weight:700;box-shadow:0 1px 3px rgba(13,42,80,.08)}
  .sec-label{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--grey2)}
  .sec-label .ic{width:19px;height:19px;color:var(--grey2)}
  .m-card{display:flex;flex-direction:column;gap:14px}
  .m-top{display:flex;gap:14px;align-items:flex-start}
  .m-top .nm{font-size:14px;font-weight:700;color:var(--black)}
  .m-top .qt{font-size:14px;color:var(--grey2);margin-top:6px}
  .m-loc{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:14px;color:var(--grey2)}
  .m-loc .ic{width:18px;height:18px;color:var(--grey2)}
  .m-apt{font-size:12px;color:var(--grey2);margin-top:6px}
  .int-ico{display:flex;gap:9px;margin-top:10px;color:var(--grey2)}
  .int-ico .ic{width:18px;height:18px}

  /* routes */
  .pill{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 9px;border-radius:100px;
        font-size:11px;font-weight:700}
  .pill .ic{width:13px;height:13px}
  .pill.orange{background:var(--orange);color:#fff}
  .pill.green{background:var(--greenbg);color:var(--green)}
  .pill.grey{background:var(--grey);color:var(--grey2)}
  .r-route{font-size:17px;font-weight:700;color:var(--black);display:flex;align-items:center;gap:8px}
  .r-sub{font-size:12px;color:var(--grey2);margin-top:6px}
  .r-dates{display:flex;gap:26px;margin-top:14px}
  .r-dates .dcell .dl{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--black)}
  .r-dates .dcell .dl .ic{width:15px;height:15px;color:var(--blue)}
  .r-dates .dcell .dv{font-size:13px;color:var(--grey2);margin-top:5px}
  .r-crew{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--orange);margin-top:14px}
  .r-crew .ic{width:16px;height:16px}
  .mini{border:1px solid #F8D9B4;background:#FFFBF5;border-radius:12px;padding:12px 14px;display:flex;
        align-items:center;gap:12px;margin-top:10px}
  .mini .nm{font-size:13px;font-weight:700;color:var(--black)}
  .mini .dt{font-size:12px;color:var(--grey2);margin-top:4px}
  .mini .btn{width:132px;flex:none;height:32px;font-size:12.5px}

  /* fields (shared with create/edit) */
  .fields{display:flex;flex-direction:column;gap:14px}
  .f-label{display:flex;gap:10px;align-items:center;margin-bottom:8px;font-size:12px;color:var(--black)}
  .f-label .ic{width:24px;height:24px;color:var(--blue);flex:none}
  .f-count{margin-left:auto;font-size:12px;color:var(--grey2)}
  .f-count.max{color:var(--orange);font-weight:600}
  .inp{background:var(--light);min-height:48px;border-radius:8px;padding:10px 15px;display:flex;
       align-items:center;justify-content:space-between;gap:10px;font-size:14px;line-height:24px;color:var(--grey2);position:relative}
  .inp .chev{width:24px;height:24px;color:var(--grey2);flex:none}
  .inp input{border:0;background:transparent;outline:none;flex:1;min-width:0;font-family:var(--font-body);
             font-size:14px;line-height:24px;color:var(--black)}
  .inp input::placeholder{color:var(--grey2)}
  .inp.tap{cursor:pointer}
  .inp .val{color:var(--black);font-weight:600}
  .drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid var(--grey);
        border-radius:12px;box-shadow:0 14px 34px rgba(20,30,50,.16);overflow:hidden;z-index:30;display:none}
  .drop.open{display:block}
  .drop div{padding:13px 16px;font-size:14px;border-bottom:1px solid var(--grey);cursor:pointer;color:var(--black)}
  .drop div:last-child{border-bottom:0}
  .drop div:hover{background:#EEF4FB}
  .addbtn{width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;border:0;display:flex;
          align-items:center;justify-content:center;cursor:pointer;flex:none}
  .addbtn svg{width:16px;height:16px}
  .addbtn:disabled{background:var(--grey);color:#A6B3C4;cursor:not-allowed}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .chips:empty{display:none}
  .chip{display:inline-flex;align-items:center;gap:8px;height:32px;padding:0 5px 0 12px;border-radius:100px;
        background:var(--light);border:1px solid var(--grey);font-size:13px;font-weight:600;color:var(--black)}
  .chip .pl{width:16px;height:16px;color:var(--blue);flex:none}
  .chip .x{width:22px;height:22px;border-radius:50%;border:0;background:transparent;color:var(--grey2);
           cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
  .chip .x svg{width:14px;height:14px}
  .chip .x:hover{background:var(--grey)}
  .f-hint{display:none;font-size:12px;color:var(--orange);margin-top:8px}
  .f-hint.show{display:block}
  .textarea{background:var(--light);border-radius:8px;padding:10px 15px;font-size:14px;line-height:24px;
            color:var(--grey2);min-height:93px}

  /* activity chips */
  .act-grid{display:flex;flex-wrap:wrap;gap:10px}
  .achip{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 15px;border-radius:100px;
         background:#fff;border:1px solid var(--grey);font-size:13px;font-weight:600;color:var(--grey2);cursor:pointer}
  .achip.sel{background:var(--greenbg);border-color:var(--green);color:var(--green)}

  /* interests (edit) */
  .int-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:12px 14px}
  .ichip{display:inline-flex;align-items:center;justify-content:center;gap:10px;height:32px;padding:7px 14px;
         border-radius:100px;font-size:14px;font-weight:700;color:var(--grey2);border:1px solid var(--grey);
         background:#fff;cursor:pointer;white-space:nowrap}
  .ichip .ii{width:20px;height:20px;display:flex;flex:none}
  .ichip .ii svg{width:100%;height:100%}
  .ichip.i24 .ii{width:24px;height:24px}
  .ichip.sel{background:var(--blue);border-color:var(--blue);color:#fff}
  .vchip{display:inline-flex;align-items:center;gap:10px;height:32px;padding:7px 14px;font-size:14px;
         font-weight:700;color:var(--grey2)}
  .vchip .ii{width:20px;height:20px;display:flex;flex:none}
  .vchip .ii svg{width:100%;height:100%}
  .vchip.i24 .ii{width:24px;height:24px}

  /* profile view */
  .v-center{display:flex;flex-direction:column;align-items:center;gap:7px;margin-top:6px}
  .p-avatar{width:100px;height:100px;position:relative;margin:10px auto 0}
  .p-avatar img{width:100px;height:100px;border-radius:50%;object-fit:cover;display:block}
  .p-avatar .cam{position:absolute;left:76px;top:76px;width:24px;height:24px;display:flex;
                 filter:drop-shadow(0 1px 2px rgba(0,0,0,.08))}
  .v-name h2{font-family:var(--font-head);font-weight:600;font-size:24px;color:var(--black);text-align:center}
  .v-name p{font-family:var(--font-head);font-size:14px;line-height:24px;color:var(--grey2);text-align:center;margin-top:4px}
  .v-pill{width:150px;height:25px;border-radius:8px;background:var(--lightblue);color:#fff;font-size:14px;
          font-weight:700;display:flex;align-items:center;justify-content:center}
  .v-ints{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 14px;margin-top:17px}
  .info-rows{display:flex;flex-direction:column;gap:16px}
  .info-row{display:flex;justify-content:space-between;align-items:flex-start}
  .cell{display:flex;gap:10px;align-items:center;min-width:0;width:47%}
  .cell .ic{width:24px;height:24px;color:var(--blue);flex:none;display:flex;align-items:center;justify-content:center}
  .cell .t{display:flex;flex-direction:column;gap:1px;min-width:0}
  .cell .t i{font-style:normal;font-size:12px;color:var(--black)}
  .cell .t b{font-size:14px;line-height:24px;font-weight:700;color:var(--black);white-space:nowrap;
             overflow:hidden;text-overflow:ellipsis;max-width:140px}
  .valrow{display:flex;align-items:center;gap:7px;min-width:0}
  .ac-more{display:inline-flex;align-items:center;gap:3px;height:20px;padding:0 7px;border-radius:100px;
           background:var(--light);border:1px solid var(--grey);color:var(--grey2);font-size:11px;
           font-weight:700;cursor:pointer;flex:none;font-family:var(--font-body)}
  .ac-more svg{width:11px;height:11px}
  .pd-title{font-size:14px;font-weight:700;color:var(--black);margin-bottom:6px}
  .pd-text{font-size:12px;line-height:1.55;color:var(--grey2)}
  .vis{background:var(--greenbg);border-radius:8px;padding:10px 20px;display:flex;justify-content:space-between;
       align-items:flex-start;gap:12px}
  .vis .tt b{font-size:14px;font-weight:700;color:var(--black);display:block}
  .vis .tt span{font-size:12px;color:var(--grey2);display:block;margin-top:6px}
  .toggle{width:30px;height:18px;border-radius:9px;background:var(--green);position:relative;cursor:pointer;
          flex:none;margin-top:6px;transition:background .18s}
  .toggle::after{content:'';position:absolute;top:1px;left:12px;width:16px;height:16px;border-radius:50%;
                 background:#fff;transition:left .18s;box-shadow:0 1px 2px rgba(0,0,0,.18)}
  .toggle.off{background:#CBD5E1}
  .toggle.off::after{left:1px}

  /* messages */
  .msg-row{border:1px solid var(--grey);border-radius:15px;padding:20px;background:#fff;display:flex;
           gap:16px;align-items:center;cursor:pointer}
  .msg-row .nm{font-size:14px;font-weight:700;color:var(--black)}
  .msg-row .pv{font-size:14px;color:var(--grey2);margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .msg-row .mm{font-size:12px;color:var(--grey2);margin-top:4px}
  .msg-meta{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;
            gap:10px;flex:none;align-self:stretch}
  .msg-meta .dt{font-size:12px;color:var(--grey2);white-space:nowrap}
  .unread{min-width:21px;height:21px;border-radius:11px;background:var(--blue);padding:0 6px;display:flex;
          align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:500}

  /* chat */
  .chat-hd{padding:26px 18px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--grey)}
  .chat-hd .bk{width:24px;height:24px;color:var(--black);cursor:pointer;flex:none;display:flex}
  .chat-hd .nm{font-weight:700;font-size:15px;color:var(--black)}
  .chat-hd .st{font-size:12px;color:var(--grey2);margin-top:2px}
  .chat-body{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px;scrollbar-width:none}
  .chat-body::-webkit-scrollbar{display:none}
  .divider{display:flex;align-items:center;gap:12px;padding:6px 0}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--grey)}
  .divider span{font-size:11px;color:var(--grey2);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
  .msg{display:flex;gap:10px;align-items:flex-start;max-width:85%}
  .msg.mine{flex-direction:row-reverse;align-self:flex-end}
  .msg .mav{width:36px;height:36px;flex:none}
  .msg .mhd{display:flex;gap:8px;align-items:center;margin-bottom:4px;padding-left:2px}
  .msg .mhd b{font-size:13px;color:var(--black)}
  .msg .mhd .mrole{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:var(--lightblue);color:#fff}
  .bubble{background:#F4F6F8;color:var(--black);padding:10px 14px;border-radius:14px;border-top-left-radius:4px;
          font-size:14px;line-height:1.4;max-width:280px;word-break:break-word}
  .msg.mine .bubble{background:var(--blue);color:#fff;border-radius:14px;border-top-right-radius:4px}
  .mtime{font-size:11px;color:var(--grey2);margin-top:4px;padding:0 2px;display:flex;gap:6px}
  .mtime .rd{color:var(--green);font-weight:600}
  .composer{padding:12px 18px;display:flex;gap:10px;align-items:center;border-top:1px solid var(--grey);background:#fff}
  .composer .plus{width:22px;height:22px;color:var(--grey2);flex:none}
  .composer input{flex:1;height:40px;border-radius:20px;background:var(--light);border:0;outline:none;
                  padding:0 14px;font-family:var(--font-body);font-size:14px;color:var(--black)}
  .composer input::placeholder{color:var(--grey2)}
  .send{width:40px;height:40px;border-radius:20px;background:var(--blue);border:0;display:flex;
        align-items:center;justify-content:center;cursor:pointer;flex:none;color:#fff}
  .send svg{width:20px;height:20px}

  /* settings */
  .set-list{display:flex;flex-direction:column}
  .set-row{display:flex;align-items:center;gap:14px;padding:17px 6px;border-bottom:1px solid var(--grey);cursor:pointer}
  .set-row .ic{width:24px;height:24px;color:var(--blue);flex:none}
  .set-row .tt{flex:1;min-width:0}
  .set-row .tt b{font-size:14px;font-weight:600;color:var(--black);display:block}
  .set-row .tt span{font-size:12px;color:var(--grey2);display:block;margin-top:3px}
  .set-row .chev{width:20px;height:20px;color:var(--grey2);flex:none;transform:rotate(-90deg)}
  .set-row.danger .ic,.set-row.danger b{color:#D13B40}
  .status-pill{font-size:11px;font-weight:700;border-radius:100px;padding:3px 10px;flex:none}
  .status-pill.green{background:var(--greenbg);color:var(--green)}
  .status-pill.grey{background:var(--grey);color:var(--grey2)}
  .status-pill.red{background:#FDE8E8;color:#D13B40}

  /* paywall */
  .pw-hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 30px 0}
  .pw-hero .lg svg{width:58px;height:63px}
  .pw-hero h2{font-family:var(--font-head);font-weight:600;font-size:24px;margin-top:16px}
  .pw-hero p{font-size:14px;line-height:24px;color:var(--grey2);margin-top:4px}
  .price-card{border:1.5px solid var(--blue);border-radius:15px;padding:18px 20px;display:flex;
              align-items:center;gap:14px;background:#F5F9FE}
  .price-card .pc-t b{font-size:15px;font-weight:700;display:block}
  .price-card .pc-t span{font-size:12px;color:var(--grey2);display:block;margin-top:4px}
  .price-card .pc-p{margin-left:auto;text-align:right}
  .price-card .pc-p b{font-size:20px;font-weight:700;color:var(--blue)}
  .price-card .pc-p span{font-size:12px;color:var(--grey2);display:block}
  .feat{display:flex;align-items:flex-start;gap:12px;padding:9px 2px}
  .feat .ic{width:22px;height:22px;color:var(--green);flex:none}
  .feat b{font-size:14px;font-weight:600;color:var(--black);display:block}
  .feat span{font-size:12px;color:var(--grey2);display:block;margin-top:2px}
  .paybtn{height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;
          font-size:16px;font-weight:600;cursor:pointer;border:0;width:100%;font-family:-apple-system,'Segoe UI',Roboto,sans-serif}
  .paybtn.apple{background:#000;color:#fff}
  .paybtn.gpay{background:#fff;color:#3C4043;border:1px solid #DADCE0}
  .paybtn svg{height:22px;width:auto}
  .pw-note{font-size:11.5px;color:var(--grey2);text-align:center;line-height:1.6}
  .pw-banner{border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:center;font-size:13px;font-weight:600}
  .pw-banner .ic{width:22px;height:22px;flex:none}
  .pw-banner.green{background:var(--greenbg);color:var(--green)}
  .pw-banner.amber{background:#FEF3E2;color:#B45309}

  /* notice / success */
  .full-note{padding:40px 34px;display:flex;flex-direction:column;align-items:center;text-align:center;
             height:100%;overflow-y:auto;scrollbar-width:none}
  .full-note::-webkit-scrollbar{display:none}
  .fn-ic{width:100px;height:100px;border-radius:50%;background:var(--light);display:flex;align-items:center;
         justify-content:center;margin-top:26px}
  .fn-ic .ic{width:52px;height:52px;color:var(--blue)}
  .fn-ic.green{background:var(--greenbg)}
  .fn-ic.green .ic{color:var(--green)}
  .full-note h2{font-family:var(--font-head);font-weight:600;font-size:24px;margin-top:22px}
  .full-note>p{font-size:14px;line-height:24px;color:var(--grey2);margin-top:8px}
  .fn-list{width:100%;margin-top:22px;display:flex;flex-direction:column;gap:4px;text-align:left}
  .fn-item{display:flex;gap:12px;align-items:center;padding:9px 4px}
  .fn-item .ic{width:22px;height:22px;flex:none}
  .fn-item.ok .ic{color:var(--green)}
  .fn-item.no .ic{color:var(--grey2)}
  .fn-item span{font-size:14px;color:var(--black)}
  .fn-item.no span{color:var(--grey2)}
  .fn-btns{width:100%;margin-top:auto;padding-top:26px;display:flex;flex-direction:column;gap:12px}

  /* bottom nav */
  .botnav{flex:none;height:80px;border-top:1px solid var(--grey);display:flex;gap:40px;justify-content:center;
          padding-top:14px;background:#fff}
  .nav-it{width:60px;display:flex;flex-direction:column;align-items:center;cursor:pointer;color:var(--grey2)}
  .nav-it .ni{width:24px;height:24px;display:flex}
  .nav-it span{font-family:var(--font-head);font-size:12px;line-height:24px;color:var(--grey2)}
  .nav-it.active{color:var(--blue)}
  .nav-it.active span{color:var(--blue)}

  /* overlays */
  .backdrop{position:absolute;inset:0;background:rgba(9,29,54,.42);opacity:0;pointer-events:none;
            transition:opacity .25s;z-index:40}
  .backdrop.open{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;
         padding:10px 24px 30px;transform:translateY(103%);transition:transform .3s cubic-bezier(.32,.72,.33,1);
         z-index:41;box-shadow:0 -14px 44px rgba(13,42,80,.22)}
  .sheet.open{transform:translateY(0)}
  .handle{width:44px;height:4px;border-radius:2px;background:var(--grey);margin:4px auto 16px}
  .sheet-head{display:flex;align-items:center;gap:9px;margin-bottom:4px}
  .sheet-head b{font-size:16px;font-weight:700}
  .sheet-count{min-width:20px;height:20px;padding:0 6px;border-radius:100px;background:#E8F1FB;color:var(--blue);
               font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .sheet-row{display:flex;align-items:center;gap:12px;height:52px;border-bottom:1px solid var(--grey);
             font-size:14px;font-weight:600}
  .sheet-row:last-child{border-bottom:0}
  .sheet-row .ic{width:20px;height:20px;color:var(--blue);flex:none}
  .limit-ic{width:76px;height:76px;border-radius:50%;background:var(--light);display:flex;align-items:center;
            justify-content:center;margin:6px auto 0}
  .limit-ic .ic{width:38px;height:38px;color:var(--blue)}
  .sheet h3{font-family:var(--font-head);font-weight:600;font-size:20px;text-align:center;margin-top:14px}
  .sheet .sub{font-size:14px;line-height:24px;color:var(--grey2);text-align:center;margin-top:6px}
  .sheet .btns{display:flex;flex-direction:column;gap:10px;margin-top:20px}

  /* payment sheets */
  .pay-head{display:flex;align-items:center;justify-content:center;padding:4px 0 14px;border-bottom:1px solid var(--grey)}
  .pay-row{display:flex;align-items:center;gap:12px;padding:14px 2px;border-bottom:1px solid var(--grey)}
  .pay-row .ic{width:30px;height:22px;flex:none;color:var(--grey2)}
  .pay-row .tt{flex:1}
  .pay-row .tt b{font-size:13.5px;font-weight:600;display:block}
  .pay-row .tt span{font-size:12px;color:var(--grey2)}
  .pay-total{display:flex;justify-content:space-between;padding:16px 2px 4px;font-size:14px}
  .pay-total b{font-size:16px}
  .spin{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;
        animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* demo state switcher (outside phone) */
  .demo-states{display:flex;gap:6px;background:#fff;border:1px solid #E3E9F0;border-radius:100px;padding:5px;
               box-shadow:0 4px 14px rgba(13,42,80,.08)}
  .demo-states button{border:0;background:transparent;border-radius:100px;padding:7px 14px;font-family:var(--font-body);
                      font-size:12px;font-weight:600;color:var(--grey2);cursor:pointer;transition:all .15s}
  .demo-states button.on{background:var(--blue);color:#fff}
</style>
</head>
<body>

<div class="phone">
  <div class="views" id="views"></div>
  <div class="botnav" id="botnav" style="display:none">
    <div class="nav-it" data-nav="discover"><span class="ni" data-icon="navSearch"></span><span>Discover</span></div>
    <div class="nav-it" data-nav="routes"><span class="ni" data-icon="navRoutes"></span><span>Routes</span></div>
    <div class="nav-it" data-nav="messages"><span class="ni" data-icon="navMessages"></span><span>Messages</span></div>
    <div class="nav-it" data-nav="profile"><span class="ni" data-icon="profileNav"></span><span>Profile</span></div>
  </div>
  <div class="backdrop" id="backdrop"></div>
  <div class="sheet" id="sheet"></div>
</div>

<div class="demo-states" id="demoStates">
  <button data-state="trial">Trial</button>
  <button data-state="limits">Limits</button>
  <button data-state="active">Subscription</button>
  <button data-state="expired">Expired</button>
</div>

function showView(id, opts = {}) {
  if (!opts.noPush && navStack[navStack.length - 1] !== id) navStack.push(id);
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('v-' + id).classList.add('active');
  const isRoot = ROOTS.includes(id);
  botnav.style.display = isRoot ? 'flex' : 'none';
  if (isRoot) {
    navStack = [id];
    document.querySelectorAll('.nav-it').forEach(n => n.classList.toggle('active', n.dataset.nav === id));
  }
}
function goBack() {
  navStack.pop();
  showView(navStack[navStack.length - 1] || 'discover', { noPush: true });
}
function resetTo(id) { navStack = [id]; showView(id, { noPush: true }); }

/* ======================= payments ======================= */
let payState = { provider: 'apple', card: 0, failed: false, picker: false, adding: false };
const PAY_CARDS = {
  apple: ['Visa •••• 4921', 'Visa •••• 0002'],
  gpay: ['Mastercard •••• 8004', 'Mastercard •••• 0002']
};
function openPaySheet(provider) {
  payState = { provider, card: 0, failed: false, picker: false, adding: false };
  renderPaySheet();
  sheetEl.classList.add('open'); backdropEl.classList.add('open');
}
function renderPaySheet() {
  const apple = payState.provider === 'apple';
  const cards = PAY_CARDS[payState.provider];
  let cardBlock;
  if (payState.adding) {
    cardBlock = `
    <div style="padding:14px 2px;border-bottom:1px solid var(--grey)">
      <div style="font-size:13.5px;font-weight:600;margin-bottom:10px">Add card</div>
      <div class="inp" style="margin-bottom:8px"><input id="newCardNum" placeholder="Card number" inputmode="numeric" maxlength="19"></div>
      <div style="display:flex;gap:8px">
        <div class="inp" style="flex:1"><input id="newCardExp" placeholder="MM/YY" maxlength="5"></div>
        <div class="inp" style="flex:1"><input id="newCardCvc" placeholder="CVC" inputmode="numeric" maxlength="3"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn ghost sm" style="flex:1" onclick="payState.adding=false;renderPaySheet()">Cancel</button>
        <button class="btn primary sm" style="flex:1" onclick="saveNewCard()">Save card</button>
      </div>
    </div>`;
  } else if (payState.picker && !apple) {
    cardBlock = cards.map((c, i) => `
    <div class="pay-row" style="cursor:pointer" onclick="pickPayCard(${i})"><span class="ic">${I.card}</span>
      <span class="tt"><b>${c}</b><span>Google Pay · James Cooper</span></span>
      ${i === payState.card ? `<span class="ic" style="width:20px;height:20px;color:var(--blue)">${I.check}</span>` : ''}
    </div>`).join('') + `
    <div class="pay-row" style="cursor:pointer" onclick="payState.adding=true;renderPaySheet()">
      <span class="ic" style="color:var(--blue)">${I.plusCircle}</span>
      <span class="tt"><b style="color:var(--blue)">Add card</b><span>Pay with a new credit or debit card</span></span>
    </div>`;
  } else {
    cardBlock = `
    <div class="pay-row" style="cursor:pointer" onclick="${apple ? 'togglePayCard()' : 'payState.picker=true;renderPaySheet()'}"><span class="ic">${I.card}</span>
      <span class="tt"><b>${cards[payState.card]}</b><span>${apple ? 'Apple Pay' : 'Google Pay'} · James Cooper</span></span>
      <span class="chev" style="width:20px;height:20px;color:var(--grey2);transform:rotate(-90deg);display:flex">${I.chevron}</span>
    </div>`;
  }
  sheetEl.innerHTML = `<div class="handle"></div>
    <div class="pay-head" style="gap:6px">${apple
      ? `<span style="width:20px;height:24px;display:flex">${I.apple}</span><span style="font-size:19px;font-weight:600;font-family:-apple-system,'Segoe UI',sans-serif">Pay</span>`
      : `<span style="width:24px;height:24px;display:flex">${I.gpayG}</span><span style="font-size:19px;font-weight:600;color:#3C4043;font-family:Roboto,'Segoe UI',sans-serif">Pay</span>`}
    </div>
    ${cardBlock}
    <div class="pay-row"><span class="ic">${I.crown}</span>
      <span class="tt"><b>Birdmember Membership · Annual</b><span>Renews automatically · Cancel anytime</span></span>
    </div>
    <div class="pay-total"><span>Pay Birdmember</span><b>€29.99</b></div>
    ${payState.failed ? `<div class="pw-banner" style="margin-top:12px;background:#FDE8E8;color:#D13B40"><span class="ic">${I.x}</span><span><b style="display:block;font-size:13.5px">Payment not completed</b><span style="font-weight:400;font-size:12px">Your card was declined. Try another payment method.</span></span></div>` : ''}
    <div class="btns" style="margin-top:14px;display:flex;flex-direction:column;gap:10px">
      ${payState.adding ? '' : `<button class="paybtn ${apple ? 'apple' : ''}" style="${apple ? '' : 'background:#1A73E8;color:#fff'}" id="payConfirm" onclick="confirmPay(this)">
        ${payState.failed ? 'Try again' : apple ? `<span style="width:20px;height:20px;display:flex">${I.faceid}</span>Confirm with Face ID` : 'Pay €29.99'}
      </button>`}
    </div>`;
}
function togglePayCard() {
  payState.card = payState.card === 0 ? 1 : 0;
  payState.failed = false;
  renderPaySheet();
}
function pickPayCard(i) {
  payState.card = i;
  payState.picker = false;
  payState.failed = false;
  renderPaySheet();
}
function saveNewCard() {
  const numEl = document.getElementById('newCardNum');
  const num = (numEl.value || '').replace(/\D/g, '');
  if (num.length < 12) {
    const box = numEl.closest('.inp');
    box.classList.add('err');
    setTimeout(() => box.classList.remove('err'), 900);
    return;
  }
  PAY_CARDS.gpay.push('Visa •••• ' + num.slice(-4));
  payState.card = PAY_CARDS.gpay.length - 1;
  payState.adding = false;
  payState.picker = false;
  renderPaySheet();
}
function confirmPay(btn) {
  btn.innerHTML = '<span class="spin"></span>';
  btn.style.pointerEvents = 'none';
  setTimeout(() => {
    if (PAY_CARDS[payState.provider][payState.card].includes('0002')) {   /* declined card — state unchanged */
      payState.failed = true;
      renderPaySheet();
      return;
    }
    closeSheet();
    S.plan = 'active';
    S.cancelled = false;
    document.getElementById('successText').textContent = 'Your membership is active until ' + S.activeUntil + '. Time to plan the next layover.';
    renderAll(); syncDemo();
    showView('success');
  }, 1100);
}

    const av = avatarHtml({ photo: m.photo || c.photo, initials: m.initials || c.initials }, 36);
    const head = c.group || m.who ? `<div class="mhd"><b>${m.who || c.name}</b>${(m.role || c.role) ? `<span class="mrole">${m.role || c.role}</span>` : ''}</div>` : '';
    return `<div class="msg"><span class="mav">${av}</span><div>${head}<div class="bubble">${esc(m.t)}</div><div class="mtime"><span>${m.tm}</span></div></div></div>`;
  }).join('');
  body.scrollTop = body.scrollHeight;
}
function sendMsg() {
  const inp = document.getElementById('chatInput');
  const v = inp.value.trim(); if (!v) return;
  const now = new Date();
  CHATS[S.currentChat].msgs.push({ s: 'r', t: v, tm: now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0') });
  inp.value = ''; renderChat();
}
document.getElementById('v-chat').querySelector('#chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

/* aircraft edit */
function addAircraft() {
  const inp = document.getElementById('acInput');
  const v = inp.value.trim();
  if (!v || S.aircraft.length >= MAX_AC) return;
  if (S.aircraft.some(a => a.toLowerCase() === v.toLowerCase())) { inp.value = ''; return; }
  S.aircraft.push(v); inp.value = ''; renderAll();
}
function removeAircraft(i) { S.aircraft.splice(i, 1); renderAll(); }
document.getElementById('acInput').addEventListener('keydown', e => { if (e.key === 'Enter') addAircraft(); });

/* create form widgets */
function toggleDrop(e) {
  e.stopPropagation();
  document.getElementById('apDrop').classList.toggle('open');
}
document.getElementById('apDrop').innerHTML = AIRPORTS.map((a, i) => `<div onclick="pickAirport(${i});event.stopPropagation()">${a.city} (${a.code})</div>`).join('');
function pickAirport(i) {
  createSel.airport = AIRPORTS[i];
  const el = document.getElementById('apVal');
  el.textContent = AIRPORTS[i].city + ' (' + AIRPORTS[i].code + ')';
  el.className = 'val';
  document.getElementById('apDrop').classList.remove('open');
}
document.getElementById('actGrid').innerHTML = ACTIVITIES.map(a =>
  `<span class="achip${createSel.acts.has(a) ? ' sel' : ''}" onclick="this.classList.toggle('sel')">${a.replace('&', '&amp;')}</span>`).join('');

/* interests grid */
const intGrid = document.getElementById('intGrid');
intGrid.innerHTML = INTERESTS.map(it =>
  `<span class="ichip${it.sel ? ' sel' : ''}${it.big ? ' i24' : ''}" onclick="${it.clear ? 'clearInts()' : 'this.classList.toggle(\'sel\')'}"><span class="ii">${I[it.i]}</span>${it.n.replace('&', '&amp;')}</span>`).join('');
function clearInts() { intGrid.querySelectorAll('.ichip.sel').forEach(c => c.classList.remove('sel')); }

/* ======================= renders ======================= */
function renderRoutes() {
  document.getElementById('routesList').innerHTML = S.routes.map(r => {
    const matches = r.matches.map(m => {
      let btn;
      if (m.kind === 'message') btn = `<button class="btn primary sm" style="width:132px;height:32px;font-size:12.5px" onclick="openChat('${m.id}')">Message</button>`;
      else if (m.id === 'elena' && S.elenaConnect === 'pending') btn = `<button class="btn disabled sm" style="width:132px;height:32px;font-size:12.5px">Request pending</button>`;
      else btn = `<button class="btn orange sm" style="width:132px;height:32px;font-size:12.5px" onclick="tryConnect('${m.id}')">Connect</button>`;
      return `<div class="mini"><span class="initials" style="width:40px;height:40px;font-size:13px">${m.initials}</span>
        <div style="flex:1;min-width:0"><div class="nm">${m.name}</div><div class="dt">${m.dates}</div></div>${btn}</div>`;
    }).join('');
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
        <div class="r-route">${r.code}</div>
        <div style="display:flex;gap:7px">
          ${r.matches.length ? `<span class="pill orange"><span class="ic">${I.person}</span>${r.matches.length} matches</span>` : ''}
          ${r.visible ? `<span class="pill green"><span class="ic">${I.eye}</span>Visible</span>` : `<span class="pill grey"><span class="ic">${I.eyeOff}</span>hidden</span>`}
        </div>
      </div>
      <div class="r-sub">${r.sub}</div>
      <div class="r-dates">
        <div class="dcell"><div class="dl"><span class="ic">${I.calendar}</span>Departure</div><div class="dv">${r.dep}</div></div>
        <div class="dcell"><div class="dl"><span class="ic">${I.calendar}</span>Return</div><div class="dv">${r.ret}</div></div>
      </div>
      ${r.matches.length ? `<div class="r-crew"><span class="ic">${I.person}</span>${r.matches.length} crew members on this route!</div>${matches}` : ''}
      <div class="btn-row" style="margin-top:16px">
        <button class="btn ghost sm">Edit</button>
        <button class="btn primary sm">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function renderDiscover() {
  const b = document.getElementById('btnMaria');
  if (S.mariaConnect === 'pending') { b.className = 'btn disabled sm'; b.textContent = 'Request pending'; b.onclick = null; }
  else { b.className = 'btn orange sm'; b.textContent = 'Connect'; b.onclick = () => tryConnect('maria'); }
}

function renderProfile() {
  document.getElementById('pAcFirst').textContent = S.aircraft[0] || '—';
  const extra = S.aircraft.length - 1;
  document.getElementById('pAcMore').hidden = extra < 1;
  document.getElementById('pAcMoreN').textContent = '+' + Math.max(extra, 0);
  /* edit screen chips */
  document.getElementById('acChips').innerHTML = S.aircraft.map((a, i) =>
    `<span class="chip"><span class="pl">${I.plane}</span>${esc(a)}<button class="x" onclick="removeAircraft(${i})">${I.x}</button></span>`).join('');
  const cnt = document.getElementById('acCount');
  cnt.textContent = S.aircraft.length + '/' + MAX_AC;
  cnt.classList.toggle('max', S.aircraft.length >= MAX_AC);
  document.getElementById('acInput').disabled = S.aircraft.length >= MAX_AC;
  document.getElementById('acAdd').disabled = S.aircraft.length >= MAX_AC;
  document.getElementById('acHint').classList.toggle('show', S.aircraft.length >= MAX_AC);
}

function membershipStatus() {
  if (S.plan === 'active') return S.cancelled
    ? { sub: 'Active until ' + S.activeUntil + ' · won’t renew', pill: '<span class="status-pill green">Active</span>' }
    : { sub: 'Active until ' + S.activeUntil, pill: '<span class="status-pill green">Active</span>' };
  if (S.plan === 'expired') return { sub: 'Expired on ' + S.expiredOn, pill: '<span class="status-pill red">Expired</span>' };
  return { sub: 'Free plan', pill: '<span class="status-pill grey">Free</span>' };
}

function renderSettings() {
  const ms = membershipStatus();
  const row = (ic, t, s, extra, onclick, cls) =>
    `<div class="set-row${cls ? ' ' + cls : ''}" ${onclick ? `onclick="${onclick}"` : ''}>
      <span class="ic">${I[ic]}</span><span class="tt"><b>${t}</b>${s ? `<span>${s}</span>` : ''}</span>
      ${extra || ''}<span class="chev">${I.chevron}</span></div>`;
  document.getElementById('setList').innerHTML =
    row('crown', 'Membership', ms.sub, ms.pill, "showView('paywall')") +
    row('bell', 'Notifications', 'Push & email') +
    row('shield', 'Privacy', 'Profile visibility & blocking') +
    row('key', 'Change Password', '') +
    row('help', 'Help & Support', '') +
    row('docs', 'Terms & Privacy Policy', '') +
    `<div class="set-row danger"><span class="ic">${I.signout}</span><span class="tt"><b>Sign Out</b></span></div>`;
}

function renderPaywall() {
  const feats = `
    <div style="margin-top:18px">
      <div class="feat"><span class="ic">${I.checkCircle}</span><span><b>Unlimited layovers</b><span>Create as many travel plans as you fly</span></span></div>
      <div class="feat"><span class="ic">${I.checkCircle}</span><span><b>New connections</b><span>Send connection requests to any crew member</span></span></div>
      <div class="feat"><span class="ic">${I.checkCircle}</span><span><b>Route matches</b><span>Get matched with crew on your layovers</span></span></div>
      <div class="feat"><span class="ic">${I.checkCircle}</span><span><b>Full radar access</b><span>See who’s nearby, worldwide</span></span></div>
    </div>`;
  const price = `
    <div class="price-card" style="margin-top:22px">
      <span class="ic" style="width:26px;height:26px;color:var(--blue);display:flex">${I.crown}</span>
      <span class="pc-t"><b>Annual membership</b><span>Same price worldwide · Cancel anytime</span></span>
      <span class="pc-p"><b>€29.99</b><span>per year</span></span>
    </div>`;
  const paybtns = `
    <div style="display:flex;flex-direction:column;gap:12px;margin-top:22px">
      <button class="paybtn apple" onclick="openPaySheet('apple')"><span style="width:19px;height:23px;display:flex">${I.apple}</span><span style="font-size:17px">Pay</span></button>
      <button class="paybtn gpay" onclick="openPaySheet('gpay')"><span style="width:21px;height:21px;display:flex">${I.gpayG}</span><span style="font-size:17px">Pay</span></button>
    </div>
    <div class="pw-note" style="margin-top:14px">€29.99 billed once a year · Renews automatically · Cancel anytime in your store settings</div>`;
  let banner = '';
  if (S.plan === 'active') banner = `<div class="pw-banner green" style="margin-top:22px"><span class="ic">${I.checkCircle}</span>${S.cancelled ? 'Active until ' + S.activeUntil + ' · won’t renew' : 'Active · renews ' + S.activeUntil}</div>`;
  if (S.plan === 'expired') banner = `<div class="pw-banner amber" style="margin-top:22px"><span class="ic">${I.lock}</span>Expired on ${S.expiredOn}</div>`;
  document.getElementById('pwBody').innerHTML = `
    <div class="pw-hero"><span class="lg">${I.logo.replace('width="29" height="32"', 'width="58" height="63"')}</span>
      <h2>Birdmember Membership</h2><p>Full access to the crew community</p></div>
    ${banner}
    ${S.plan === 'active' ? feats + `<button class="btn ghost" style="margin-top:18px" onclick="openManageSheet()">Manage subscription</button><div class="pw-note" style="margin-top:12px">Managed via your App Store or Google Play account</div>` : price + feats + paybtns}`;
}

function renderNotice() {
  const expired = S.plan === 'expired';
  document.getElementById('noticeBody').innerHTML = `
    <div class="fn-ic"><span class="ic">${expired ? I.lock : I.plane}</span></div>
    <h2>${expired ? 'Your membership has expired' : 'You’ve used your 3 free layovers'}</h2>
    <p>${expired ? 'Renew to keep creating layovers and connecting with new crew members.' : 'You can keep exploring Birdmember — here’s what’s available right now.'}</p>
    <div class="fn-list">
      <div class="fn-item ok"><span class="ic">${I.checkCircle}</span><span>Browse the radar &amp; member profiles</span></div>
      <div class="fn-item ok"><span class="ic">${I.checkCircle}</span><span>Continue your existing chats</span></div>
      <div class="fn-item no"><span class="ic">${I.lock}</span><span>Create new layovers</span></div>
      <div class="fn-item no"><span class="ic">${I.lock}</span><span>Send new connection requests</span></div>
    </div>
    <div class="fn-btns">
      <button class="btn primary" onclick="showView('paywall')">${expired ? 'Renew membership' : 'Get membership'} — €29.99/year</button>
      <button class="btn ghost" onclick="resetTo('discover')">Continue browsing</button>
    </div>`;
}

function renderAll() { renderRoutes(); renderDiscover(); renderProfile(); renderSettings(); renderPaywall(); }

/* ======================= demo state switcher ======================= */
const demoEl = document.getElementById('demoStates');
function syncDemo() {
  demoEl.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.state === S.plan));
}
demoEl.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
  const st = b.dataset.state;
  S.plan = st;
  S.cancelled = false;
  S.mariaConnect = 'none';
  S.elenaConnect = 'none';
  if (st === 'trial') S.layoversUsed = 2;
  if (st === 'limits') S.layoversUsed = 3;
  closeSheet(); renderAll(); syncDemo();
  if (st === 'limits' || st === 'expired') { renderNotice(); navStack = ['discover']; showView('notice'); }
  else resetTo('discover');
}));

/* ======================= init ======================= */
document.addEventListener('click', () => document.getElementById('apDrop').classList.remove('open'));
renderAll(); syncDemo();
showView('discover', { noPush: true });
</script>
</body>
</html>
